name: Release

# Build and publish a GitHub Release whenever a version tag (vX.Y.Z) is pushed.
# Also runs on manual dispatch for build verification (no release is published then).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore "D-OS Save Editor.sln"

      - name: Build (Release)
        run: msbuild "D-OS Save Editor/D-OS Save Editor.csproj" /p:Configuration=Release /m

      - name: Package release zip
        shell: pwsh
        run: |
          $name = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "dev" }
          $zip = "D-OS-Save-Editor-$name.zip"
          Compress-Archive -Path "D-OS Save Editor/bin/Release/*" -DestinationPath $zip -Force
          "ZIP=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: D-OS-Save-Editor
          path: ${{ env.ZIP }}

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: D-OS Save Editor ${{ github.ref_name }}
          files: ${{ env.ZIP }}
          generate_release_notes: true
